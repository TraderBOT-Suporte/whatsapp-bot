<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Meu Acesso · Trader Bot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ffa3;
      --green-mid: #00c97a;
      --amber: #f5a623;
      --red: #ff4d6d;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --text-muted: rgba(255,255,255,0.38);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #050508;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(0,255,163,0.12) 0%, transparent 70%);
      top: -100px; left: -80px;
      animation: driftA 14s ease-in-out infinite alternate;
    }
    body::after {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(0,120,255,0.09) 0%, transparent 70%);
      bottom: -80px; right: -60px;
      animation: driftB 18s ease-in-out infinite alternate;
    }
    @keyframes driftA { to { transform: translate(40px, 60px) scale(1.1); } }
    @keyframes driftB { to { transform: translate(-40px, -50px) scale(1.15); } }
    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 32px 28px 28px;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow: 0 0 0 1px rgba(0,255,163,0.06), 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(24px) scale(0.97); } to { opacity:1; transform: none; } }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,255,163,0.08); border: 1px solid rgba(0,255,163,0.2);
      border-radius: 100px; padding: 5px 12px; font-size: 11px;
      font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.08em;
      color: var(--green); margin-bottom: 20px; text-transform: uppercase;
    }
    .badge-dot {
      width: 6px; height: 6px; background: var(--green); border-radius: 50%;
      box-shadow: 0 0 6px var(--green); animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    h1 {
      font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
      letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 6px;
      background: linear-gradient(135deg, #fff 40%, rgba(255,255,255,0.5));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    p.sub { color: var(--text-muted); font-size: 13px; font-weight: 300; margin-bottom: 24px; line-height: 1.5; }

    /* ── Custom Dropdown ── */
    .dropdown-wrap { position: relative; margin-bottom: 12px; z-index: 10; }
    .dropdown-trigger {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px; color: #fff; font-size: 14px;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: border-color 0.2s, background 0.2s; user-select: none;
    }
    .dropdown-trigger:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.07); }
    .dropdown-trigger.open { border-color: rgba(0,255,163,0.4); background: rgba(0,255,163,0.04); box-shadow: 0 0 0 4px rgba(0,255,163,0.07); }
    .trigger-flag { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .trigger-name { flex: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trigger-ddi { color: var(--green); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .trigger-chevron { opacity: 0.35; font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
    .dropdown-trigger.open .trigger-chevron { transform: rotate(180deg); }

    .dropdown-panel {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: #0f1117; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; overflow: hidden; z-index: 100; display: none;
      box-shadow: 0 24px 64px rgba(0,0,0,0.9);
    }
    .dropdown-panel.open { display: block; animation: dropIn 0.18s cubic-bezier(0.22,1,0.36,1); }
    @keyframes dropIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: none; } }

    .dropdown-search { padding: 10px 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .dropdown-search input {
      width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #fff; font-size: 13px; font-family: 'DM Sans', sans-serif;
      padding: 8px 12px; outline: none; margin: 0;
    }
    .dropdown-search input::placeholder { color: var(--text-muted); }
    .dropdown-search input:focus { border-color: rgba(0,255,163,0.3); background: rgba(0,255,163,0.05); }

    .dropdown-list { max-height: 210px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    .dropdown-list::-webkit-scrollbar { width: 3px; }
    .dropdown-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer; transition: background 0.1s; font-size: 13.5px;
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.07); }
    .dropdown-item.selected { background: rgba(0,255,163,0.09); }
    .item-flag { font-size: 20px; line-height: 1; width: 28px; text-align: center; flex-shrink: 0; }
    .item-name { flex: 1; color: #dde1ea; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-ddi { color: var(--green); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px; flex-shrink: 0; }
    .dropdown-empty { padding: 18px; text-align: center; color: var(--text-muted); font-size: 13px; }

    /* ── Phone Input ── */
    .input-wrap { position: relative; margin-bottom: 14px; }
    .input-prefix {
      position: absolute; left: 0; top: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 0 14px; font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 13px; color: var(--green);
      border-right: 1px solid rgba(255,255,255,0.08); min-width: 66px;
      pointer-events: none; user-select: none; border-radius: 14px 0 0 14px;
    }
    input[type=tel] {
      width: 100%; padding: 15px 16px 15px 78px;
      background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08);
      border-radius: 14px; color: #fff; font-size: 15px; font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input[type=tel]::placeholder { color: var(--text-muted); }
    input[type=tel]:focus { outline: none; border-color: rgba(0,255,163,0.4); background: rgba(0,255,163,0.04); box-shadow: 0 0 0 4px rgba(0,255,163,0.07); }

    button {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--green-mid) 0%, #00a86b 100%);
      border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 600;
      font-family: 'Syne', sans-serif; letter-spacing: 0.04em; cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 8px 32px rgba(0,201,122,0.25), 0 0 0 1px rgba(0,255,163,0.15);
    }
    button::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%); pointer-events: none; }
    button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 12px 40px rgba(0,201,122,0.35), 0 0 0 1px rgba(0,255,163,0.2); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Result ── */
    .result { margin-top: 20px; display: none; }
    .result.show { display: block; animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1); }
    @keyframes fadeUp { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }
    .result-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; overflow: hidden; }
    .result-header { padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; }
    .result-header .icon { width: 36px; height: 36px; background: rgba(0,255,163,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .result-header .name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: -0.2px; }
    .result-header .plan-tag { font-size: 10px; font-weight: 600; font-family: 'Syne', sans-serif; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 100px; background: rgba(0,255,163,0.12); color: var(--green); border: 1px solid rgba(0,255,163,0.2); margin-left: auto; }
    .stats { padding: 6px 0; }
    .stat { display: flex; align-items: center; justify-content: space-between; padding: 11px 18px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13.5px; transition: background 0.15s; }
    .stat:last-child { border-bottom: none; }
    .stat:hover { background: rgba(255,255,255,0.02); }
    .stat .label { color: var(--text-muted); font-weight: 300; display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .stat .label-icon { font-size: 14px; opacity: 0.7; }
    .stat .value { font-weight: 600; font-family: 'Syne', sans-serif; font-size: 14px; letter-spacing: -0.2px; }
    .stat .value.active { color: var(--green); }
    .stat .value.expiring { color: var(--amber); }
    .stat .value.expired { color: var(--red); }
    .spinner-wrap { padding: 24px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .spinner { width: 20px; height: 20px; border: 2px solid rgba(0,255,163,0.15); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label { color: var(--text-muted); font-size: 13px; }
    .error-box { padding: 14px 18px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--red); }
    .error-box .err-icon { font-size: 18px; flex-shrink: 0; }
  </style>
</head>

    // Priority codes shown first
    const PRIORITY = ['244','55','351','238','239','245','258'];
    let selectedCode = '244';
    let sortedEntries = [];

    function buildList() {
      const priority = PRIORITY.map(c => [c, COUNTRIES[c]]).filter(([,v]) => v);
      const rest = Object.entries(COUNTRIES)
        .filter(([c]) => !PRIORITY.includes(c))
        .sort((a,b) => a[1].name.localeCompare(b[1].name, 'pt'));
      sortedEntries = [...priority, ...rest];
    }

    function renderList(q = '') {
      const list = document.getElementById('dropdownList');
      const filter = q.toLowerCase().trim();
      const items = filter
        ? sortedEntries.filter(([c, d]) => d.name.toLowerCase().includes(filter) || ('+'+c).includes(filter))
        : sortedEntries;

      if (!items.length) {
        list.innerHTML = '<div class="dropdown-empty">Nenhum país encontrado</div>';
        return;
      }
      list.innerHTML = items.map(([code, d]) =>
        `<div class="dropdown-item${code===selectedCode?' selected':''}" onclick="selectCountry('${code}')">
          <span class="item-flag">${d.flag}</span>
          <span class="item-name">${d.name}</span>
          <span class="item-ddi">+${code}</span>
        </div>`
      ).join('');
    }

    function selectCountry(code) {
      selectedCode = code;
      const d = COUNTRIES[code];
      document.getElementById('triggerFlag').textContent = d.flag;
      document.getElementById('triggerName').textContent = d.name;
      document.getElementById('triggerDdi').textContent = '+' + code;
      document.getElementById('ddiPrefix').textContent = '+' + code;
      closeDropdown();
    }

    function toggleDropdown() {
      const panel = document.getElementById('dropdownPanel');
      const trigger = document.getElementById('dropdownTrigger');
      if (panel.classList.contains('open')) { closeDropdown(); return; }
      panel.classList.add('open');
      trigger.classList.add('open');
      document.getElementById('countrySearch').value = '';
      renderList();
      setTimeout(() => document.getElementById('countrySearch').focus(), 60);
    }

    function closeDropdown() {
      document.getElementById('dropdownPanel').classList.remove('open');
      document.getElementById('dropdownTrigger').classList.remove('open');
    }

    function filterCountries() {
      renderList(document.getElementById('countrySearch').value);
    }

    document.addEventListener('click', e => {
      if (!document.getElementById('dropdownWrap').contains(e.target)) closeDropdown();
    });

    buildList();
    selectCountry('244');

    async function checkStatus() {
      const localNumber = document.getElementById('phoneInput').value.trim();
      const result = document.getElementById('result');
      const btn = document.getElementById('btn');
      if (!localNumber) {
        result.className = 'result show';
        result.innerHTML = `<div class="result-card"><div class="error-box"><span class="err-icon">⚠</span>Digite o seu número de telefone.</div></div>`;
        return;
      }
      const fullNumber = selectedCode + localNumber;
      btn.disabled = true;
      result.className = 'result show';
      result.innerHTML = `<div class="result-card"><div class="spinner-wrap"><div class="spinner"></div><span class="spinner-label">A consultar...</span></div></div>`;
      try {
        const res = await fetch(`/api/cliente/${fullNumber}`);
        const data = await res.json();
        if (data.notFound) {
          result.innerHTML = `<div class="result-card"><div class="error-box"><span class="err-icon">⊘</span>Nenhum plano activo encontrado para este número.</div></div>`;
        } else {
          const sc = data.hoursLeft <= 0 ? 'expired' : data.hoursLeft <= 24 ? 'expiring' : 'active';
          const expDate = new Date(data.expiration);
          const expStr = expDate.toLocaleDateString('pt-BR') + ' · ' + expDate.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          result.innerHTML = `
            <div class="result-card">
              <div class="result-header">
                <div class="icon">◈</div>
                <div>
                  <div class="name">${data.groupName}</div>
                  <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${data.flag||''} ${data.country||''} · ${data.userId||''}</div>
                </div>
                <div class="plan-tag">${data.level.toUpperCase()}</div>
              </div>
              <div class="stats">
                <div class="stat"><span class="label"><span class="label-icon">◷</span> Dias restantes</span><span class="value ${sc}">${data.daysLeft} dia${data.daysLeft!==1?'s':''}</span></div>
                <div class="stat"><span class="label"><span class="label-icon">⌛</span> Horas restantes</span><span class="value ${sc}">${data.hoursLeft}h</span></div>
                <div class="stat"><span class="label"><span class="label-icon">◉</span> Expira em</span><span class="value">${expStr}</span></div>
              </div>
            </div>`;
        }
      } catch (e) {
        result.innerHTML = `<div class="result-card"><div class="error-box"><span class="err-icon">⚡</span>Erro ao consultar. Tente novamente.</div></div>`;
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('phoneInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkStatus();
    });
